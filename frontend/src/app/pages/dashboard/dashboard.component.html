<div class="dashboard">
  <h1>Dashboard</h1>
  <div class="grid">
    <!-- Top row: Current Balance, Violations (FR-002) -->
    <div class="box placeholder" aria-label="Current Balance">
      <h2>Current Balance</h2>
      <p>Coming soon</p>
    </div>
    <div class="box violations" [class.clickable]="!loading && violationError === null" [class.loading]="loading">
      <h2>Violations</h2>
      @if (loading) {
        <div class="loading-indicator" aria-busy="true">
          <span class="spinner"></span>
          <span>Loading…</span>
        </div>
      } @else if (violationError) {
        <p class="error">{{ violationError }}</p>
      } @else if (summary !== null) {
        <button type="button" class="count-link" (click)="goToMyViolations()">
          {{ summary.openViolationCount === 0 ? 'No violations' : summary.openViolationCount }}
        </button>
      }
    </div>
    <!-- Bottom row: Work Orders, Architecture Requests (FR-002) -->
    <div class="box placeholder" aria-label="Work Orders">
      <h2>Work Orders</h2>
      <p>Coming soon</p>
    </div>
    <div class="box placeholder" aria-label="Architecture Requests">
      <h2>Architecture Requests</h2>
      <p>Coming soon</p>
    </div>
  </div>
</div>
