# Shared Node toolchain setup (015 US6, FR-018): pinned setup-node with the frontend npm cache.
name: "Setup Node"
description: "Pinned actions/setup-node with npm cache keyed on neko-hoa/package-lock.json."

inputs:
  node-version:
    description: "Node version"
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: neko-hoa/package-lock.json
