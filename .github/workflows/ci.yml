# PR-verification pipeline (015 US6, FR-018): everything that answers "is this change good?" —
# backend build/test/Sonar/Codecov/diff-cover, frontend unit/build/Storybook/Cypress, and the API
# contract drift gate. Shipping lives in release.yml; a CI tweak can no longer touch the deploy
# path. Image vulnerability scanning for PRs is security-scan.yml; the pre-push image gate runs in
# release.yml where the image is built.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # diff-cover needs the base branch history to compute changed lines
          fetch-depth: 0

      - name: Setup .NET
        uses: ./.github/actions/dotnet-setup
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # Exclude the Stage-2 sandbox tier (007) so PRs and non-main pushes stay hermetic —
        # no provider secrets, no real Stripe/SendGrid/Twilio calls. The sandbox tier runs
        # only in release.yml on push to main.
        run: dotnet test --no-build --configuration Release --filter "Category!=Sandbox" --collect:"XPlat Code Coverage" --results-directory ./coverage
        env:
          ASPNETCORE_ENVIRONMENT: Test

      # Scan runs after tests so coverage.opencover.xml exists; properties come
      # from sonar-project.properties at the repo root.
      # Steps are skipped (not failed) when SONAR_HOST_URL is not configured.
      - name: SonarQube scan
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}

      - name: Check SonarQube quality gate
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install diff-cover
        if: github.event_name == 'pull_request'
        run: pip install diff-cover

      - name: Enforce 90% coverage on changed lines
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Don't abort on the pipeline; capture diff-cover's exit code via pipefail
          # so the gate still fails the job, while streaming its report to the summary.
          set +e
          set -o pipefail
          {
            echo "## Diff coverage — changed lines (gate: 90%)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          diff-cover ./coverage/*/coverage.cobertura.xml \
            --compare-branch origin/${{ github.event.pull_request.base.ref }} \
            --fail-under 90 \
            --format html:diff-coverage.html 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload diff coverage report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diff-coverage-report
          path: diff-coverage.html
          if-no-files-found: ignore

  frontend:
    name: Frontend (neko-hoa)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neko-hoa

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: ./.github/actions/node-setup

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (headless)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

      - name: E2E (Cypress, headless)
        # start-server-and-test boots `ng serve` on :4200, waits for it, then runs the Cypress
        # happy-path. The Stripe instance is faked at the window.Stripe seam — no live Stripe calls.
        run: npm run e2e:ci

  contract-drift:
    # 015 US4 (FR-011): the committed generated client types must match the backend's OpenAPI
    # document. Regenerates types (backend `--export-openapi` → openapi-typescript) and fails on
    # any diff — a contract change without regenerated committed types cannot pass verification.
    name: API contract drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: ./.github/actions/dotnet-setup
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: ./.github/actions/node-setup

      - name: Install dependencies
        working-directory: neko-hoa
        env:
          CYPRESS_INSTALL_BINARY: '0'
        run: npm ci

      - name: Regenerate API contract types
        working-directory: neko-hoa
        run: npm run generate:api-types

      - name: Fail on drift
        run: |
          git diff --exit-code -- neko-hoa/src/app/core/api/generated-types.ts || {
            echo "::error::Generated API types are stale. Run 'npm run generate:api-types' in neko-hoa/ and commit the result."
            exit 1
          }
