name: Repowise Documentation

on:
  pull_request:
    branches: [main]

jobs:
  repowise:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Repowise
        uses: repowise/action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Commit updated docs
        run: |
          git config user.name "repowise-bot"
          git config user.email "repowise@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "chore: regenerate Repowise outputs" && git push)
