name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # diff-cover needs the base branch history to compute changed lines
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # Exclude the Stage-2 sandbox tier (007) so PRs and non-main pushes stay hermetic —
        # no provider secrets, no real Stripe/SendGrid/Twilio calls. The sandbox tier runs
        # only in the `integration-sandbox` job on push to main.
        run: dotnet test --no-build --configuration Release --filter "Category!=Sandbox" --collect:"XPlat Code Coverage" --results-directory ./coverage
        env:
          ASPNETCORE_ENVIRONMENT: Test

      # Scan runs after tests so coverage.opencover.xml exists; properties come
      # from sonar-project.properties at the repo root.
      # Steps are skipped (not failed) when SONAR_HOST_URL is not configured.
      - name: SonarQube scan
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}

      - name: Check SonarQube quality gate
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install diff-cover
        if: github.event_name == 'pull_request'
        run: pip install diff-cover

      - name: Enforce 90% coverage on changed lines
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Don't abort on the pipeline; capture diff-cover's exit code via pipefail
          # so the gate still fails the job, while streaming its report to the summary.
          set +e
          set -o pipefail
          {
            echo "## Diff coverage — changed lines (gate: 90%)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          diff-cover ./coverage/*/coverage.cobertura.xml \
            --compare-branch origin/${{ github.event.pull_request.base.ref }} \
            --fail-under 90 \
            --format html:diff-coverage.html 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload diff coverage report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: diff-coverage-report
          path: diff-coverage.html
          if-no-files-found: ignore

  frontend:
    name: Frontend (neko-hoa)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neko-hoa

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: neko-hoa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (headless)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

      - name: E2E (Cypress, headless)
        # start-server-and-test boots `ng serve` on :4200, waits for it, then runs the Cypress
        # happy-path. The Stripe instance is faked at the window.Stripe seam — no live Stripe calls.
        run: npm run e2e:ci

  integration-sandbox:
    name: Integration (provider sandbox)
    runs-on: ubuntu-latest
    needs: test
    # Stage 2 (007): runs the REAL Stripe/SendGrid/Twilio adapters against each provider's
    # test/sandbox mode. main-push only (FR-001) so PRs/forks never see provider secrets.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Sandbox integration tests
        # Only the Sandbox tier. A FAIL = real regression (blocks the release). A SKIP = provider
        # outage or an unconfigured secret = job stays green (does not block, SC-005). Secrets are
        # test-scoped and GitHub masks them in logs (FR-006/FR-010).
        run: dotnet test --filter "Category=Sandbox" --configuration Release
        env:
          ASPNETCORE_ENVIRONMENT: Test
          Stripe__SecretKey: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          Stripe__WebhookSigningSecret: ${{ secrets.STRIPE_WEBHOOK_SIGNING_SECRET_TEST }}
          SendGrid__ApiKey: ${{ secrets.SENDGRID_API_KEY }}
          SendGrid__FromEmail: ${{ secrets.SENDGRID_FROM_EMAIL }}
          SendGrid__Sandbox: 'true'
          Twilio__AccountSid: ${{ secrets.TWILIO_TEST_ACCOUNT_SID }}
          Twilio__AuthToken: ${{ secrets.TWILIO_TEST_AUTH_TOKEN }}
          Twilio__FromNumber: '+15005550006'
          TWILIO_TEST_CREDENTIALS: 'true'

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    # FR-003: a broken provider integration must not ship. A sandbox FAILURE blocks the image;
    # a SKIP (outage/unconfigured) leaves integration-sandbox green, so deploy still proceeds.
    needs: [test, integration-sandbox]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build locally (load into the runner daemon, no push) so Trivy can scan the exact
      # artifact BEFORE it is published (011 / FR-003 / FR-011).
      - name: Build image (local, no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: HOAManagementCompany/Dockerfile
          load: true
          push: false
          tags: nekohoa-api:scan-${{ github.sha }}

      # Gate the push: a fixable CRITICAL/HIGH (not allowlisted) fails here and the push
      # steps below never run (FR-011). Severity is the same single source as security-scan.yml.
      - name: Trivy image scan (gate before push)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: nekohoa-api:scan-${{ github.sha }}
          format: table
          severity: ${{ vars.TRIVY_SEVERITY || 'CRITICAL,HIGH' }}
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Reuses the Buildx cache from the scanned build, so the pushed image is the one Trivy validated.
      - name: Push to Docker Hub
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: HOAManagementCompany/Dockerfile
          push: true
          tags: |
            sakurapatch/nekohoa-api:latest
            sakurapatch/nekohoa-api:${{ github.sha }}

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [docker-push]
    # Auto-deploy to the isolated Dev environment on merge to main (009-dev-auto-deploy). Reuses the
    # image docker-push already published, so the deployed artifact == the one CI validated.
    # Gated on the DEV_DEPLOY_ENABLED repo variable so this job is a NO-OP until the Dev platform
    # (Neon Dev DB, Cloud Run nekohoa-api-dev, Cloudflare Pages, WIF + Secret Manager) is provisioned
    # and the variable is set to 'true'. vars.* (not secrets.*) is used in the if so the workflow parses.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEV_DEPLOY_ENABLED == 'true'
    # Latest merged commit wins: a newer run cancels an in-flight older deploy (FR-009 / SC-007).
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write   # required for Google Workload Identity Federation
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      DEV_SERVICE: nekohoa-api-dev
      IMAGE: sakurapatch/nekohoa-api:${{ github.sha }}
      PAGES_PROJECT: nekohoa-dev

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # ── Auth to GCP via Workload Identity Federation (no exportable key — S6719/SC-006) ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      # ── Backend: deploy a NO-TRAFFIC candidate revision. Migrations + seed run at candidate
      #    startup (ASPNETCORE_ENVIRONMENT=Dev → StartupOptions). All secrets are --set-secrets
      #    refs (no literal values in the workflow or image — FR-010/SC-006). ──
      # Image-only deploy: tofu is the single declarative owner of the service's env vars, secrets,
      # probes, scaling, SA, and access. A new revision INHERITS all of that from the current
      # (tofu-managed) service config; this step only swaps the image and stages it as a no-traffic
      # candidate. (Re-asserting --set-env-vars here previously WIPED tofu's non-secret env vars and
      # crashed startup.) Secret rotation still applies — the inherited :latest refs re-resolve per
      # revision. SC-006 holds: no secret literals in the workflow.
      - name: Deploy backend candidate (no traffic)
        run: |
          gcloud run deploy "$DEV_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --no-traffic --tag candidate \
            --quiet

      - name: Resolve candidate URL
        id: candidate
        run: |
          url=$(gcloud run services describe "$DEV_SERVICE" --region "$GCP_REGION" --format=json \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print(next((t.get('url','') for t in d['status'].get('traffic',[]) if t.get('tag')=='candidate'),''))")
          if [ -z "$url" ]; then echo "Could not resolve candidate URL"; exit 1; fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # ── Health gate (migration-aware: ~5 min budget for startup migrations) ──
      - name: Backend health gate
        run: |
          url="${{ steps.candidate.outputs.url }}/health"
          echo "Polling $url"
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || echo 000)
            if [ "$code" = "200" ]; then echo "Healthy after ${i} attempt(s)"; exit 0; fi
            sleep 5
          done
          echo "Candidate never became healthy within the timeout"; exit 1

      # ── Frontend: build the dev configuration and deploy a Cloudflare Pages PREVIEW ──
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: neko-hoa/package-lock.json

      - name: Build frontend (dev configuration)
        working-directory: neko-hoa
        run: |
          npm ci
          npm run build -- --configuration=dev

      - name: Deploy frontend preview (Cloudflare Pages)
        id: pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy neko-hoa/dist/neko-hoa/browser --project-name=${{ env.PAGES_PROJECT }} --branch=preview-${{ github.sha }}

      # ── E2E gate: full suite against the Dev preview BEFORE promotion. Health + E2E run as
      #    ordered steps, so a failure here fail-fasts the job and the promote steps below never
      #    run — the prior healthy release keeps 100% of traffic (FR-006/FR-007/SC-003/SC-010). ──
      - name: E2E gate (full suite vs Dev)
        working-directory: neko-hoa
        env:
          CYPRESS_BASE_URL: ${{ steps.pages.outputs.deployment-url }}
          DEV_API_BASE_URL: ${{ steps.candidate.outputs.url }}/api/v1
        run: npm run e2e:dev

      # ── Playwright smoke suite: real-stack tests (auth, payments, Stripe iframes) against
      #    the live Dev preview. Runs after Cypress passes. Failure blocks promotion. ──
      - name: Playwright smoke suite (vs Dev preview)
        working-directory: neko-hoa
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.pages.outputs.deployment-url }}
          PLAYWRIGHT_API_URL: ${{ steps.candidate.outputs.url }}
        run: |
          npx playwright install --with-deps chromium
          npm run e2e:playwright-dev

      # ── Promote (reached only when health + E2E + Playwright passed) ──
      - name: Promote backend traffic to candidate
        run: gcloud run services update-traffic "$DEV_SERVICE" --region "$GCP_REGION" --to-tags candidate=100 --quiet

      - name: Promote frontend preview to Dev production
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy neko-hoa/dist/neko-hoa/browser --project-name=${{ env.PAGES_PROJECT }} --branch=main

      # ── Notify team chat on ANY failure of this job (success stays silent — FR-008/SC-008) ──
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"🚨 Dev deploy failed for commit ${{ github.sha }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DEPLOY_ALERT_WEBHOOK_URL }}" || true
