name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the base branch history to compute changed lines
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        # Exclude the Stage-2 sandbox tier (007) so PRs and non-main pushes stay hermetic —
        # no provider secrets, no real Stripe/SendGrid/Twilio calls. The sandbox tier runs
        # only in the `integration-sandbox` job on push to main.
        run: dotnet test --no-build --configuration Release --filter "Category!=Sandbox" --collect:"XPlat Code Coverage" --results-directory ./coverage
        env:
          ASPNETCORE_ENVIRONMENT: Test

      # Scan runs after tests so coverage.opencover.xml exists; properties come
      # from sonar-project.properties at the repo root.
      # Steps are skipped (not failed) when SONAR_HOST_URL is not configured.
      - name: SonarQube scan
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}

      - name: Check SonarQube quality gate
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install diff-cover
        if: github.event_name == 'pull_request'
        run: pip install diff-cover

      - name: Enforce 90% coverage on changed lines
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Don't abort on the pipeline; capture diff-cover's exit code via pipefail
          # so the gate still fails the job, while streaming its report to the summary.
          set +e
          set -o pipefail
          {
            echo "## Diff coverage — changed lines (gate: 90%)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          diff-cover ./coverage/*/coverage.cobertura.xml \
            --compare-branch origin/${{ github.event.pull_request.base.ref }} \
            --fail-under 90 \
            --format html:diff-coverage.html 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload diff coverage report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-coverage-report
          path: diff-coverage.html
          if-no-files-found: ignore

  frontend:
    name: Frontend (neko-hoa)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neko-hoa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: neko-hoa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (headless)
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

      - name: E2E (Cypress, headless)
        # start-server-and-test boots `ng serve` on :4200, waits for it, then runs the Cypress
        # happy-path. The Stripe instance is faked at the window.Stripe seam — no live Stripe calls.
        run: npm run e2e:ci

  integration-sandbox:
    name: Integration (provider sandbox)
    runs-on: ubuntu-latest
    needs: test
    # Stage 2 (007): runs the REAL Stripe/SendGrid/Twilio adapters against each provider's
    # test/sandbox mode. main-push only (FR-001) so PRs/forks never see provider secrets.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Sandbox integration tests
        # Only the Sandbox tier. A FAIL = real regression (blocks the release). A SKIP = provider
        # outage or an unconfigured secret = job stays green (does not block, SC-005). Secrets are
        # test-scoped and GitHub masks them in logs (FR-006/FR-010).
        run: dotnet test --filter "Category=Sandbox" --configuration Release
        env:
          ASPNETCORE_ENVIRONMENT: Test
          Stripe__SecretKey: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          Stripe__WebhookSigningSecret: ${{ secrets.STRIPE_WEBHOOK_SIGNING_SECRET_TEST }}
          SendGrid__ApiKey: ${{ secrets.SENDGRID_API_KEY }}
          SendGrid__FromEmail: ${{ secrets.SENDGRID_FROM_EMAIL }}
          SendGrid__Sandbox: 'true'
          Twilio__AccountSid: ${{ secrets.TWILIO_TEST_ACCOUNT_SID }}
          Twilio__AuthToken: ${{ secrets.TWILIO_TEST_AUTH_TOKEN }}
          Twilio__FromNumber: '+15005550006'
          TWILIO_TEST_CREDENTIALS: 'true'

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    # FR-003: a broken provider integration must not ship. A sandbox FAILURE blocks the image;
    # a SKIP (outage/unconfigured) leaves integration-sandbox green, so deploy still proceeds.
    needs: [test, integration-sandbox]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: HOAManagementCompany/Dockerfile
          push: true
          tags: |
            sakurapatch/api:latest
            sakurapatch/api:${{ github.sha }}
