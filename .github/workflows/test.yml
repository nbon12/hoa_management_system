name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the base branch history to compute changed lines
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Begin SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=nekohoa-api
            -Dsonar.sources=HOAManagementCompany
            -Dsonar.tests=HOAManagementCompany.Tests
            -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
        continue-on-error: true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage
        env:
          ASPNETCORE_ENVIRONMENT: Test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install diff-cover
        if: github.event_name == 'pull_request'
        run: pip install diff-cover

      - name: Enforce 90% coverage on changed lines
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Don't abort on the pipeline; capture diff-cover's exit code via pipefail
          # so the gate still fails the job, while streaming its report to the summary.
          set +e
          set -o pipefail
          {
            echo "## Diff coverage — changed lines (gate: 90%)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          diff-cover ./coverage/*/coverage.cobertura.xml \
            --compare-branch origin/${{ github.event.pull_request.base.ref }} \
            --fail-under 90 \
            --format html:diff-coverage.html 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload diff coverage report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-coverage-report
          path: diff-coverage.html
          if-no-files-found: ignore

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: HOAManagementCompany/Dockerfile
          push: true
          tags: |
            nekohoa/api:latest
            nekohoa/api:${{ github.sha }}
