name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: HXCKFJ3498fajjAJR94
          POSTGRES_USER: sequestria1
          POSTGRES_DB: hoa_management_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Wait for PostgreSQL
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        while ! pg_isready -h localhost -p 5432 -U sequestria1; do
          sleep 1
        done
        echo "PostgreSQL is ready!"
    
    - name: Install Entity Framework tools
      run: |
        dotnet tool install --global dotnet-ef
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
    
    - name: Run database migrations
      run: dotnet ef database update --project HOAManagementCompany --connection "Host=localhost;Port=5432;Database=hoa_management_test;Username=sequestria1;Password=HXCKFJ3498fajjAJR94"
      env:
        ASPNETCORE_ENVIRONMENT: Test
    
    - name: Build & Install
      run: dotnet build HOAManagementCompany.Tests/HOAManagementCompany.Tests.csproj --configuration Debug

    - name: Ensure browsers are installed
      run: pwsh $(find HOAManagementCompany.Tests/bin/Debug -name playwright.ps1) install --with-deps

    - name: Start Blazor App
      run: |
        dotnet run --project HOAManagementCompany/HOAManagementCompany.csproj --configuration Debug --urls=http://localhost:5212 &
        sleep 10
      env:
        ASPNETCORE_ENVIRONMENT: Test
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=hoa_management_test;Username=sequestria1;Password=HXCKFJ3498fajjAJR94"

    - name: Run All Tests
      run: dotnet test --configuration Debug --verbosity normal
      env:
        PLAYWRIGHT_HEADLESS: "true"
        ASPNETCORE_ENVIRONMENT: Test
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=hoa_management_test;Username=sequestria1;Password=HXCKFJ3498fajjAJR94"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: HOAManagementCompany.Tests/TestResults/
        retention-days: 7 