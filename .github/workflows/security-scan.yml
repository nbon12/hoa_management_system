name: Security Scan (Trivy)

# Two-stage Trivy scanning kept OUT of the Dockerfile (FR-004):
#   1. trivy config  → raw OpenTofu IaC under infra/ (runs first)
#   2. trivy image   → locally built backend image, BEFORE any push (gated on stage 1 via needs:)
# Triggers: PRs to main, pushes to main, and a nightly re-scan of the published image (FR-016).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'   # nightly re-scan: published image + main's infra/ (FR-016)
  workflow_dispatch: {}   # allow manual runs for testing the scheduled path

permissions:
  contents: read
  security-events: write   # upload-sarif → Code Scanning (FR-014)
  pull-requests: read      # PR annotations

env:
  # Single source of truth for the failing-severity policy (FR-007). Set the repository
  # variable TRIVY_SEVERITY (Settings → Variables) to tighten later; the || fallback keeps
  # the workflow working before it is set. test.yml references the same vars.TRIVY_SEVERITY.
  TRIVY_SEVERITY: ${{ vars.TRIVY_SEVERITY || 'CRITICAL,HIGH' }}
  IMAGE_LOCAL_TAG: nekohoa-api:scan
  PUBLISHED_IMAGE: sakurapatch/nekohoa-api:latest

jobs:
  # ── Stage 1: IaC configuration scan (runs first; non-blocking no-op until infra/ exists) ──
  iac-config:
    name: IaC config scan (trivy config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect IaC sources
        id: detect
        shell: bash
        run: |
          if [ -d infra ] && find infra -type f \( -name '*.tf' -o -name '*.tofu' \) | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "OpenTofu sources found under infra/ — scanning."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No OpenTofu sources under infra/ yet — IaC scan is a non-blocking pass (FR-009)."
          fi

      # Report-all → SARIF (does not fail the build; keeps every severity visible)
      - name: Trivy config (SARIF)
        if: steps.detect.outputs.present == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          format: sarif
          output: trivy-iac.sarif
          exit-code: '0'

      - name: Upload IaC SARIF to Code Scanning
        if: steps.detect.outputs.present == 'true'
        continue-on-error: true   # Code Scanning may be unavailable on private repos w/o GHAS
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

      - name: Upload IaC SARIF artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-iac-sarif
          path: trivy-iac.sarif
          if-no-files-found: ignore

      # Gating pass → fails on CRITICAL/HIGH misconfigurations (FR-001/FR-005)
      - name: Trivy config (gate)
        if: steps.detect.outputs.present == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          exit-code: '1'
          trivyignores: .trivyignore

  # ── Stage 2+3: build the image locally, then scan it BEFORE any push (gated on stage 1) ──
  image-scan:
    name: Image vulnerability scan (trivy image)
    runs-on: ubuntu-latest
    needs: [iac-config]          # IaC scan runs first; build/scan gated on it (FR-001/FR-002)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # PR/push: build locally (no push). Schedule: skip build, scan the published image.
      - name: Build image (local, no push)
        if: github.event_name != 'schedule'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: HOAManagementCompany/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_LOCAL_TAG }}-${{ github.sha }}

      - name: Pull published image (scheduled re-scan)
        if: github.event_name == 'schedule'
        run: docker pull "$PUBLISHED_IMAGE"

      - name: Resolve scan target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ref=$PUBLISHED_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${IMAGE_LOCAL_TAG}-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # Report-all → SARIF (does not fail; unfixed findings stay visible for awareness)
      - name: Trivy image (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.target.outputs.ref }}
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'

      - name: Upload image SARIF to Code Scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload image SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore

      # Gating pass → fails on FIXABLE CRITICAL/HIGH not in .trivyignore (FR-003/FR-005/FR-015)
      - name: Trivy image (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.target.outputs.ref }}
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
