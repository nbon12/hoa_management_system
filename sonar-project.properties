sonar.projectKey=nekohoa-api
sonar.projectName=HOA Management System — API

# ---------------------------------------------------------------------------
# Source layout
# ---------------------------------------------------------------------------
sonar.sources=HOAManagementCompany
sonar.tests=HOAManagementCompany.Tests

# ---------------------------------------------------------------------------
# Exclusions
# EF Core migrations are auto-generated and should not be linted, have
# coverage tracked against them, or trigger duplicate-code findings.
# Build artefacts and designer files are similarly not hand-written code.
# ---------------------------------------------------------------------------
sonar.exclusions=\
  **/Migrations/**,\
  **/obj/**,\
  **/bin/**,\
  **/*.Designer.cs

sonar.coverage.exclusions=\
  **/Migrations/**,\
  **/Program.cs,\
  **/*.Designer.cs

# CPD (duplicate-code detection): migrations are scaffolded and will
# legitimately share structure — suppress false positives there only.
sonar.cpd.exclusions=**/Migrations/**

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
sonar.sourceEncoding=UTF-8
