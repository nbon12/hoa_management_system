services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: nekohoa
      POSTGRES_USER: nekohoa
      POSTGRES_PASSWORD: nekohoa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nekohoa -d nekohoa"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

  # .NET Aspire Dashboard — zero-config local telemetry viewer (FR-006/FR-014).
  # Local-dev only; not deployed. Anonymous mode, no login token.
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    restart: unless-stopped
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      # Expose the OTLP/HTTP (protobuf) receiver on 18890 (FR-022).
      DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL: "http://0.0.0.0:18890"
    ports:
      - "18888:18888"   # Dashboard UI
      - "18890:18890"   # OTLP/HTTP receiver
    networks:
      - app_network

  api:
    build:
      context: .
      dockerfile: HOAManagementCompany/Dockerfile
    restart: unless-stopped
    ports:
      - "5212:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=nekohoa;Username=nekohoa;Password=nekohoa"
      Jwt__Secret: "dev-secret-change-in-production-must-be-at-least-32-chars"
      Jwt__Issuer: "nekohoa-api"
      Jwt__Audience: "nekohoa-frontend"
      Storage__ServiceUrl: "http://minio:9000"
      Storage__PublicServiceUrl: "http://localhost:9000"
      Storage__AccessKey: "minioadmin"
      Storage__SecretKey: "minioadmin"
      Storage__BucketName: "hoa-documents"
      Storage__ForcePathStyle: "true"
      # OpenTelemetry → Aspire Dashboard (FR-007/FR-014/FR-022).
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18890"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "hoa-api"
    depends_on:
      db:
        condition: service_healthy
      aspire-dashboard:
        condition: service_started
    networks:
      - app_network

  # NekoHOA Angular app (neko-hoa/). Stop any local `ng serve` on 4200 before starting.
  ui:
    container_name: nekohoa-ui
    build:
      context: ./neko-hoa
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - app_network

volumes:
  postgres_data:
  minio_data:

networks:
  app_network:
    driver: bridge
