services:
  db:
    image: postgres:16-alpine 
    restart: unless-stopped 

    environment:
      
      POSTGRES_DB: sequestria 
      POSTGRES_USER: sequestria1 
      POSTGRES_PASSWORD: HXCKFJ3498fajjAJR94 
      # POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C" # Optional: Initialisation arguments

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sequestria1 -d sequestria"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5212:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=sequestria;Username=sequestria1;Password=HXCKFJ3498fajjAJR94"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - app_network

volumes:
  postgres_data:

# Define custom networks
networks:
  app_network: 
    driver: bridge
